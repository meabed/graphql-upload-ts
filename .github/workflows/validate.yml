name: Validate

# Reusable workflow that runs lint, typecheck, test, and build. Called by
# `ci.yml` (on PRs and feature-branch pushes) and `release.yml` (before
# semantic-release publishes). Single source of truth for what counts as
# "validated" — both gates run identical checks.

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to test against (must be a supported LTS line)'
        required: false
        type: string
        default: '22'
      run-build:
        description: 'Whether to run the build step (skip for fast PR checks).'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Node ${{ inputs.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck (tsc)
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        if: inputs.run-build
        run: bun run build
