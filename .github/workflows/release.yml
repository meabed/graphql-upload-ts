name: Release
on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
      - '.github/workflows/**'
      - '.changeset/**'
      - 'scripts/release/**'
      - 'src/**'
      - '__tests__/**'
      - 'package.json'
      - 'yarn.lock'
      - 'bun.lock'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  CI: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Verify release inputs
        run: yarn release:verify

      - name: Ensure verification did not modify tracked files
        run: git diff --exit-code

      - name: Create Release Pull Request or Publish Package
        id: changesets
        uses: changesets/action@v1
        with:
          branch: changeset-release/${{ github.ref_name }}
          commit: "chore(release): version package (${{ github.ref_name }})"
          title: "Version Package (${{ github.ref_name }})"
          version: "${{ github.ref_name == 'develop' && 'yarn release:version:beta' || 'yarn release:version:stable' }}"
          publish: "yarn release:publish"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_CHANNEL: ${{ github.ref_name == 'develop' && 'beta' || 'latest' }}
