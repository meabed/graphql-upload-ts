name: Release

# Master/develop release pipeline. Validates first (same checks as CI), then
# runs semantic-release to tag, publish to npm with provenance, and create the
# GitHub release. Pre-releases on `develop` follow the same path — semantic-
# release reads `.releaserc.json` for the per-branch policy.

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run semantic-release in --dry-run mode (no publish)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - 'package.json'
      - 'bun.lock'
      - '.releaserc.json'

# Never cancel an in-flight release — interrupting between npm publish and
# git tag/GitHub release leaves the registry inconsistent. Queue instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate before release
    uses: ./.github/workflows/validate.yml
    with:
      # Pin to the current Active LTS for the release pipeline.
      node-version: '24'
      run-build: true

  release:
    name: Publish
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      # contents: write — semantic-release pushes tags and version-bump commits
      # issues / pull-requests: write — semantic-release-github comments on released PRs/issues
      # id-token: write — required for npm provenance (sigstore attestations)
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history is required so semantic-release can compute the next
          # version from all commits since the previous tag.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Active LTS — same version the validate job ran against.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run semantic-release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: Mohamed Meabed
          GIT_AUTHOR_EMAIL: mo@meabed.com
          GIT_COMMITTER_NAME: Mohamed Meabed
          GIT_COMMITTER_EMAIL: mo@meabed.com
          DRY_RUN: ${{ inputs.dry-run && '--dry-run' || '' }}
        run: |
          set -euo pipefail
          # Plugins are pinned in devDependencies — installed via `bun install`
          # above. Run via npx so the package-local versions are used; no
          # `npm i -g` (slow + unpinned).
          npx semantic-release $DRY_RUN 2>&1 | tee release-output.txt

          # Surface the published version + tag for the summary step.
          if grep -qE 'Published release|Created tag' release-output.txt; then
            VERSION=$(grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?' release-output.txt | head -1)
            if [[ -z "$VERSION" ]]; then
              VERSION=$(grep -oP 'Created tag v\K[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?' release-output.txt | head -1)
            fi
            echo "release_published=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release summary
        if: always()
        env:
          PUBLISHED: ${{ steps.semantic_release.outputs.release_published }}
          VERSION: ${{ steps.semantic_release.outputs.version }}
          TAG: ${{ steps.semantic_release.outputs.tag }}
          DRY_RUN: ${{ inputs.dry-run }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## 📦 Release Summary"
            echo
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "### 🟡 Dry run — nothing published"
              echo
              echo "Re-run without \`dry-run\` input to publish."
            elif [[ "$PUBLISHED" == "true" ]]; then
              echo "### ✅ Published"
              echo
              echo "- **Version:** \`$VERSION\`"
              echo "- **Tag:** \`$TAG\`"
              echo "- **Branch:** \`$BRANCH\`"
              echo "- **Commit:** \`$COMMIT\`"
              echo
              echo "### 🔗 Links"
              echo "- [npm](https://www.npmjs.com/package/graphql-upload-ts/v/$VERSION)"
              echo "- [GitHub release](https://github.com/$REPO/releases/tag/$TAG)"
            else
              echo "### ℹ️ No release published"
              echo
              echo "semantic-release decided no release was warranted on \`$BRANCH\`. Common reasons:"
              echo "- No \`feat\` / \`fix\` / \`perf\` commits since the last tag"
              echo "- All new commits use non-release types (\`chore\`, \`docs\`, \`test\`, etc.)"
              echo "- Branch isn't configured for release in \`.releaserc.json\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
