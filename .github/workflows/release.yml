name: Release
on:
  workflow_dispatch:
  workflow_call:
  push:
    paths:
      - '.github/workflows/**'
      - '.changeset/**'
      - 'scripts/release/**'
      - 'src/**'
      - '__tests__/**'
      - 'package.json'
      - 'yarn.lock'
      - 'bun.lock'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  CI: true

jobs:
  release:
    name: Release
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release track
        id: release_track
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            develop)
              echo "channel=beta" >> "$GITHUB_OUTPUT"
              ;;
            master)
              echo "channel=latest" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release branch: ${GITHUB_REF_NAME}" >&2
              echo "Allowed release branches are develop -> beta and master -> latest." >&2
              exit 1
              ;;
          esac

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Verify release inputs
        run: yarn release:verify

      - name: Ensure verification did not modify tracked files
        run: git diff --exit-code

      - name: Version package for release track
        run: yarn release:version

      - name: Commit release version changes
        id: release_commit
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(release): publish ${GITHUB_REF_NAME} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: yarn release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_CHANNEL: ${{ steps.release_track.outputs.channel }}
          RELEASE_TAG_REPAIR: "1"
          RELEASE_CLEANUP_LEGACY_TAGS: "1"
