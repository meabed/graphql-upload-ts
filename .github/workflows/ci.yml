name: CI
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - master
      - develop
    paths:
      - '.github/workflows/**'
      - '.changeset/**'
      - 'scripts/release/**'
      - 'src/**'
      - '__tests__/**'
      - 'package.json'
      - 'yarn.lock'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'jest.config.js'
      - 'rollup.config.js'
      - 'biome.json'
  push:
    paths:
      - '.github/workflows/**'
      - '.changeset/**'
      - 'scripts/release/**'
      - 'src/**'
      - '__tests__/**'
      - 'package.json'
      - 'yarn.lock'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'jest.config.js'
      - 'rollup.config.js'
      - 'biome.json'
    branches:
      - '*'
      - '**'
      - '!master'
      - '!develop'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  test-node:
    name: Test (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

  test-bun:
    name: Test (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Validate
        run: bun run validate:bun

      - name: Build
        run: bun run build
